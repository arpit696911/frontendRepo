<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sales Insight Automator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://unpkg.com/modern-css-reset/dist/reset.min.css" />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1.5rem;
      }
      .card {
        background: radial-gradient(circle at top left, #1d4ed8, #020617);
        border-radius: 1rem;
        padding: 2rem;
        max-width: 480px;
        width: 100%;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.7);
      }
      .card h1 {
        font-size: 1.7rem;
        margin-bottom: 0.25rem;
      }
      .card p.subtitle {
        font-size: 0.9rem;
        color: #cbd5f5;
        margin-bottom: 1.5rem;
      }
      label {
        display: block;
        font-size: 0.85rem;
        margin-bottom: 0.35rem;
        color: #c7d2fe;
      }
      input[type="file"],
      input[type="email"] {
        width: 100%;
        border-radius: 0.6rem;
        border: 1px solid rgba(148, 163, 184, 0.7);
        padding: 0.6rem 0.75rem;
        background: rgba(15, 23, 42, 0.6);
        color: #e5e7eb;
        font-size: 0.9rem;
      }
      input[type="file"] {
        padding: 0.4rem;
      }
      input:focus {
        outline: none;
        border-color: #60a5fa;
        box-shadow: 0 0 0 1px #60a5fa40;
      }
      .field {
        margin-bottom: 1.1rem;
      }
      button {
        width: 100%;
        border: none;
        border-radius: 999px;
        padding: 0.75rem 1rem;
        margin-top: 0.5rem;
        font-size: 0.95rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        background: linear-gradient(135deg, #22c55e, #16a34a);
        color: white;
        cursor: pointer;
        transition: transform 0.08s ease, box-shadow 0.08s ease, opacity 0.1s ease;
        box-shadow: 0 18px 40px rgba(34, 197, 94, 0.35);
      }
      button:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 22px 55px rgba(34, 197, 94, 0.5);
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        box-shadow: none;
      }
      .helper {
        font-size: 0.76rem;
        color: #9ca3af;
        margin-top: 0.15rem;
      }
      .status {
        margin-top: 1rem;
        font-size: 0.85rem;
      }
      .status.success {
        color: #bbf7d0;
      }
      .status.error {
        color: #fecaca;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        border-radius: 999px;
        padding: 0.25rem 0.7rem;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.09em;
        margin-bottom: 0.75rem;
        background: rgba(15, 23, 42, 0.7);
        border: 1px solid rgba(148, 163, 184, 0.6);
        color: #e5e7eb;
      }
      .pill-dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: #22c55e;
        box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="pill">
        <span class="pill-dot"></span>
        Sales Insight Automator
      </div>
      <div id="root"></div>
    </div>

   
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
